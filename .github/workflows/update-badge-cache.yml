name: Update Badge Cache Buster

on:
  schedule:
    - cron: '15 * * * *'  # 매시간 15분에 실행 (서버 sync 후 여유를 두고)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch updated_at from server
        id: fetch
        run: |
          # 서버에서 updated_at 가져오기
          RESPONSE=$(curl -sf "https://web-majsoulusername.up.railway.app/api/debug/Ssawaul" || echo "{}")
          UPDATED_AT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('updated_at',''))" 2>/dev/null || echo "")

          if [ -z "$UPDATED_AT" ]; then
            echo "Could not fetch updated_at, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            # updated_at을 Unix timestamp로 변환
            TS=$(python3 -c "from datetime import datetime; s='$UPDATED_AT'; dt=datetime.fromisoformat(s); print(int(dt.timestamp()))")
            echo "ts=$TS" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README badge URLs
        if: steps.fetch.outputs.skip == 'false'
        run: |
          TS="${{ steps.fetch.outputs.ts }}"
          # badge URL의 ?t=숫자 부분만 교체 (없으면 추가)
          python3 - <<'EOF'
          import re, os, sys

          ts = os.environ["TS"]

          with open("mahjong_soul_badge/README.md", encoding="utf-8") as f:
              content = f.read()

          # ?t=숫자 혹은 ?v=숫자 를 ?t={ts} 로 교체
          # badge/숫자 또는 badge3/숫자 URL 패턴 대상
          pattern = r'(https://web-majsoulusername\.up\.railway\.app/badge3?/\d+)(\?[tv]=\d+)?'

          def replacer(m):
              return m.group(1) + f"?t={ts}"

          new_content = re.sub(pattern, replacer, content)

          if new_content == content:
              print("No changes needed.")
              sys.exit(0)

          with open("mahjong_soul_badge/README.md", "w", encoding="utf-8") as f:
              f.write(new_content)
          print("README updated.")
          EOF
        env:
          TS: ${{ steps.fetch.outputs.ts }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes, skipping commit." && exit 0
          git add mahjong_soul_badge/README.md
          git commit -m "chore: update badge cache buster [skip ci]"
          git push
